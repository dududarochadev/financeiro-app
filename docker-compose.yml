version: '3.8'

services:
  financeiro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financeiro
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sconapp:sconapp_local_pg@host.docker.internal:5432/financeiro
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
    networks:
      - financeiro-net

networks:
  financeiro-net:
    driver: bridge
