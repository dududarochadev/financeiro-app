services:
  financeiro:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: financeiro
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://sconapp:sconapp_local_pg@sconapp-postgres:5432/financeiro
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=https://financeiro.duckdns.org
    networks:
      - deploy_default

networks:
  deploy_default:
    external: true
